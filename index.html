<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />

    <title>Motion Studio — Premium Animated Websites for Indian D2C Brands</title>
    <meta name="description" content="Premium animated landing pages and AI-powered websites for Indian D2C brands and startups. Built with React, Motion, and Tailwind." />
    <meta name="author" content="Motion Studio · Lakshay Kumar" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Motion Studio — Premium Animated Websites" />
    <meta property="og:description" content="Premium animated landing pages and AI-powered websites for Indian D2C brands and startups." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://lakshay-portfolio-alpha.vercel.app" />
    <meta property="og:site_name" content="Motion Studio" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Motion Studio — Premium Animated Websites" />
    <meta name="twitter:description" content="Premium animated landing pages and AI-powered websites for Indian D2C brands and startups." />
    <meta name="twitter:image" content="/og-image.png" />

    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
      html { scroll-behavior: smooth; }
      /* Reduce motion for users who prefer it (accessibility) */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
